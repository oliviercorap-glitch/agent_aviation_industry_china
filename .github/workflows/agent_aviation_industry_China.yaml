name: Veille Aviation GSE (Chine)

on:
  schedule:
    # Lance le script tous les jours à 6h00 (heure UTC)
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Permet de lancer le script manuellement depuis l'onglet "Actions" de GitHub

jobs:
  run-aviation-agent:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupère tout le code de votre dépôt
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Installe Python 3.11
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. INSTALLATION DES BIBLIOTHEQUES (la correction magique !)
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Lance votre script (assurez-vous que le nom du fichier est bon)
      - name: Run Aviation Agent
        run: python test_search.py
        env:
          # Récupère votre clé API stockée dans les Secrets de GitHub
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      # 5. Optionnel : sauvegarde le rapport généré pour le télécharger facilement
      - name: Upload generated report
        uses: actions/upload-artifact@v4
        with:
          name: aviation-report
          path: rapports/
