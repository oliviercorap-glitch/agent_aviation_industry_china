name: Veille Aviation GSE (Chine)

on:
  schedule:
    # Lance le script tous les jours à 6h00 (heure UTC)
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Permet de lancer le script manuellement depuis l'onglet "Actions" de GitHub

permissions:
  contents: write   # AJOUTÉ : sans ça, le job ne peut pas commit/push le rapport vers le repo

jobs:
  run-aviation-agent:
    runs-on: ubuntu-latest
    steps:
      # 1. Récupère tout le code de votre dépôt
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Installe Python 3.11
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. INSTALLATION DES BIBLIOTHEQUES (la correction magique !)
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Lance votre script (assurez-vous que le nom du fichier est bon)
      - name: Run Aviation Agent
        run: python china_aviation_agent.py
        env:
          # Récupère votre clé API stockée dans les Secrets de GitHub
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}

      # 5. Sauvegarde le rapport généré pour le télécharger facilement
      #    CORRIGÉ : "rapports/" -> "reports/*.html" (le script écrit maintenant
      #    dans ce dossier, avec un nom de fichier daté + latest.html)
      - name: Upload generated report
        uses: actions/upload-artifact@v4
        with:
          name: aviation-report
          path: reports/*.html

      # 6. AJOUTÉ : commit le rapport dans le repo, pour que
      #    weekly_digest_agent.py puisse le lire via l'API GitHub.
      #    Sans cette étape, le rapport n'existe que sur le runner éphémère
      #    et disparaît à la fin du job.
      - name: Commit reports back to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: aviation intelligence report [skip ci]"
            git push
          fi
