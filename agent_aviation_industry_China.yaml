name: Veille Aviation & Aéroports Chine

on:
  schedule:
    - cron: '0 0 * * 1-5'   # lundi-vendredi 8h Shanghai (UTC+0)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  aviation-veille:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Restaurer le cache des articles vus
        uses: actions/cache@v3
        with:
          path: seen_aviation_articles.json
          key: seen-aviation-${{ github.run_id }}
          restore-keys: |
            seen-aviation-

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: |
          pip install requests beautifulsoup4 lxml anthropic python-dotenv

      - name: Lancer l'agent
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python china_aviation_agent.py

      - name: Sauvegarder le cache mis à jour
        uses: actions/cache@v3
        with:
          path: seen_aviation_articles.json
          key: seen-aviation-${{ github.run_id }}

      - name: Sauvegarder le rapport
        uses: actions/upload-artifact@v4
        with:
          name: aviation-chine-${{ github.run_number }}
          path: rapports/
          retention-days: 90